services:
  - type: web
    name: radar-backend
    env: python
    region: oregon
    plan: free
    rootDir: radar
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: FRONTEND_ORIGIN
        value: https://radar-real-time-autonomous-defense.vercel.app
